version: 2

project_name: defer

before:
  hooks:
    - go mod tidy

builds:
  - id: defer
    main: .
    binary: defer
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - name: defer
    repository:
      owner: defer-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/defer-ai/cli"
    description: "Zero-autonomy AI. Every decision is yours."
    license: "MIT"
    install: |
      bin.install "defer"
    test: |
      system "#{bin}/defer", "--version"
    commit_author:
      name: goreleaserbot
      email: goreleaserbot@users.noreply.github.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

release:
  github:
    owner: defer-ai
    name: cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
